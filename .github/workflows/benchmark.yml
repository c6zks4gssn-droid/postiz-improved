name: Performance Benchmark
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build benchmark
        run: |
          echo "## Build Performance" >> $GITHUB_STEP_SUMMARY
          START=$(date +%s%N)
          pnpm build 2>/dev/null
          END=$(date +%s%N)
          DIFF=$(( (END - START) / 1000000 ))
          echo "Build time: ${DIFF}ms" >> $GITHUB_STEP_SUMMARY
      - name: Bundle size
        run: |
          echo "## Bundle Size" >> $GITHUB_STEP_SUMMARY
          find apps/frontend/dist -name "*.js" -exec du -sh {} \; 2>/dev/null | head -10 >> $GITHUB_STEP_SUMMARY || echo "Bundle analysis requires build output" >> $GITHUB_STEP_SUMMARY
